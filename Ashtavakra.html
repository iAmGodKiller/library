<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>अष्टावक्र गीता</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Serif+Devanagari:wght@500;600&family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#e9c349",
                        "on-background": "#e5e2e1",
                        "background": "#0a0a0c",
                        "primary": "#d6bcf4",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#ccc4cf"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "devanagari": ["Noto Serif Devanagari", "serif"],
                        "body": ["Inter"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            overflow: hidden;
        }

        .stars {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            margin-top: -100vmax;
            margin-left: -100vmax;
            border-radius: 50%;
        }

        .star-layer-1 {
            background-image: 
                radial-gradient(circle at 20px 30px, #ffffff, transparent 1px),
                radial-gradient(circle at 100px 80px, #e0ebff, transparent 1.5px),
                radial-gradient(circle at 200px 150px, #ffffff, transparent 1px),
                radial-gradient(circle at 310px 40px, #fffae6, transparent 2px),
                radial-gradient(circle at 80px 250px, #ffffff, transparent 1px),
                radial-gradient(circle at 260px 300px, #d6bcf4, transparent 1.5px),
                radial-gradient(circle at 150px 350px, #ffffff, transparent 1px),
                radial-gradient(circle at 50px 420px, #e9c349, transparent 2px);
            background-size: 433px 433px;
            animation: drift 240s linear infinite, twinkle 4s ease-in-out infinite alternate;
        }

        .star-layer-2 {
            background-image: 
                radial-gradient(circle at 50px 120px, #ffffff, transparent 1.5px),
                radial-gradient(circle at 180px 40px, #e9c349, transparent 2px),
                radial-gradient(circle at 280px 190px, #ffffff, transparent 1px),
                radial-gradient(circle at 390px 80px, #e0ebff, transparent 1.5px),
                radial-gradient(circle at 120px 310px, #ffffff, transparent 1px),
                radial-gradient(circle at 220px 380px, #d6bcf4, transparent 2.5px),
                radial-gradient(circle at 350px 280px, #ffffff, transparent 1px),
                radial-gradient(circle at 420px 450px, #fffae6, transparent 1px);
            background-size: 509px 509px;
            animation: drift 320s linear infinite reverse, twinkle 5.5s ease-in-out infinite alternate 1.5s;
        }

        .star-layer-3 {
            background-image: 
                radial-gradient(circle at 30px 200px, #ffffff, transparent 2px),
                radial-gradient(circle at 140px 70px, #fffae6, transparent 1px),
                radial-gradient(circle at 240px 250px, #ffffff, transparent 1.5px),
                radial-gradient(circle at 320px 140px, #d6bcf4, transparent 2px),
                radial-gradient(circle at 90px 410px, #ffffff, transparent 1px),
                radial-gradient(circle at 270px 430px, #e9c349, transparent 1.5px),
                radial-gradient(circle at 450px 320px, #ffffff, transparent 1px),
                radial-gradient(circle at 180px 480px, #e0ebff, transparent 2px);
            background-size: 577px 577px;
            animation: drift 400s linear infinite, twinkle 4.8s ease-in-out infinite alternate 2.7s;
        }

        .nebula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            margin-top: -100vmax;
            margin-left: -100vmax;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(107, 85, 133, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(233, 195, 73, 0.05) 0%, transparent 40%);
            filter: blur(80px);
            animation: drift 120s linear infinite;
        }

        .sacred-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(214, 188, 244, 0.05) 1px, transparent 0);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            from { opacity: 0.15; }
            to { opacity: 0.85; }
        }

        .text-glow {
            text-shadow: 0 0 25px rgba(233, 195, 73, 0.4);
        }

        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            overflow-y: scroll;
        }

        body {
            overflow-x: clip;
        }

        section, article, .chapter-title-slide {
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        article, .chapter-title-slide {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .chapter-title-slide {
            flex-direction: column;
            justify-content: center;
        }
    
        .text-purple-gold {
            color: #D6BCF4;
            text-shadow: 0 0 8px rgba(233, 195, 73, 0.5);
        }

        .sanskrit-verse {
            font-family: 'Noto Serif Devanagari', serif;
            font-weight: 500;
        }
    
        @media (min-width: 1024px) {
            .sanskrit-verse p {
                white-space: nowrap;
            }
            .sanskrit-verse {
                width: max-content;
                min-width: 100%;
            }
        }

        body.lang-hindi .lang-en { display: none; }
        body.lang-hindi .lang-hi { display: block; }
        body:not(.lang-hindi) .lang-en { display: block; }
        body:not(.lang-hindi) .lang-hi { display: none; }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior: contain; 
            transform: translate3d(0, 0, 0); 
            -webkit-transform: translate3d(0, 0, 0);
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            touch-action: pan-y; 
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(0, 0, 0, 0.4) 100%);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-color: rgba(255, 255, 255, 0.05);
            border-right-color: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 0 4px 15px rgba(0, 0, 0, 0.5);
            position: relative;
            isolation: isolate; 
        }

        .glass-btn::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            box-shadow: 0 0 30px rgba(233, 195, 73, 0.6), inset 0 0 15px rgba(233, 195, 73, 0.2);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1; 
            pointer-events: none;
        }

        .glass-btn:hover::after {
            animation: pulse-glow-opacity 1.5s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow-opacity {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-secondary/30 selection:text-secondary">

</button>

<a id="library-btn" href="https://iamgodkiller.github.io/library" class="fixed top-4 right-4 md:top-6 md:right-6 z-50 px-4 py-2 rounded-full glass-btn text-secondary/70 hover:text-secondary hover:scale-105 transition-all duration-500 focus:outline-none flex items-center justify-center no-underline">
    <span class="font-headline italic tracking-widest text-xs md:text-sm">Library</span>

<!-- Sidebar -->
<div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 opacity-0 pointer-events-none transition-opacity duration-500 ease-out"></div>

<div id="sidebar" class="fixed top-4 bottom-4 left-4 w-80 rounded-[2rem] bg-gradient-to-br from-white/10 via-black/20 to-black/60 backdrop-blur-2xl backdrop-saturate-150 border border-white/20 border-b-white/5 border-r-white/5 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_20px_40px_rgba(0,0,0,0.8)] transform -translate-x-[120%] transition-transform duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] will-change-transform z-40 flex flex-col">
    <button onclick="toggleSidebar()" class="absolute top-6 right-6 z-50 p-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-on-surface-variant hover:text-primary transition-all duration-300 focus:outline-none flex items-center justify-center">
        <span class="material-symbols-outlined text-sm">close</span>
    </button>
    <div class="p-8 flex-1 overflow-y-auto no-scrollbar">
        <h2 class="text-secondary font-headline text-2xl tracking-widest italic mb-2">Chapters</h2>
        <p class="text-[10px] text-on-surface-variant/60 tracking-widest uppercase mb-8">Ashtavakra Gita</p>
        <nav id="chapter-list" class="space-y-3"></nav>
    </div>
</div>

<div class="cosmic-canvas">
    <div class="stars star-layer-1"></div>
    <div class="stars star-layer-2"></div>

<main class="relative z-10">
    <!-- Hero -->
    <section class="flex flex-col items-center justify-center min-h-screen px-6 text-center relative">
        <div class="relative py-12">
            <span class="font-label text-secondary tracking-[0.4em] uppercase text-[10px] md:text-xs mb-10 md:mb-14 block">Sage Ashtavakra &amp; King Janaka</span>

<script>
    let activeChapter = 1;
    let lastScrollY = window.scrollY;

    // Processor to ensure the last word stays with the Viram (punctuation)
    function makePunctuationSticky(htmlString) {
        return htmlString.replace(/([^\s<]+)([।॥])/g, '<span class="inline-block">$1$2</span>');
    }

    function handleNavVisibility() {
        const menuBtn = document.getElementById('menu-btn');
        const libraryBtn = document.getElementById('library-btn');
        const sidebar = document.getElementById('sidebar');
        const isSidebarClosed = sidebar.classList.contains('-translate-x-[120%]');
        
        const currentScrollY = window.scrollY;

        if (isSidebarClosed) {
            if (currentScrollY < lastScrollY || currentScrollY <= 50) {
                menuBtn.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
                libraryBtn.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
            } 
            else if (currentScrollY > lastScrollY && currentScrollY > 50) {
                menuBtn.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
                libraryBtn.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
            }
        }
        lastScrollY = currentScrollY;
    }

    function toggleTranslation() {
        const isHindi = document.body.classList.toggle('lang-hindi');
        document.querySelectorAll('.trans-btn').forEach(btn => {
            btn.innerText = isHindi ? 'ENGLISH' : 'HINDI';
        });
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-btn');
        const libraryBtn = document.getElementById('library-btn');
        const isClosed = sidebar.classList.contains('-translate-x-[120%]');
        const isMobile = window.innerWidth < 768;

        if (isClosed) {
            sidebar.classList.remove('-translate-x-[120%]');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            menuBtn.classList.add('opacity-0', 'pointer-events-none', 'scale-75');
            if (isMobile && libraryBtn) libraryBtn.classList.add('opacity-0', 'pointer-events-none', 'scale-75');
        } else {
            sidebar.classList.add('-translate-x-[120%]');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            menuBtn.classList.remove('opacity-0', 'pointer-events-none', 'scale-75');
            if (libraryBtn) libraryBtn.classList.remove('opacity-0', 'pointer-events-none', 'scale-75');
            handleNavVisibility();
        }
    }

    function switchChapter(num) {
        toggleSidebar();
        setTimeout(() => {
            const target = document.getElementById(`chapter-${num}`);
            if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 300);
    }

    function updateSidebarActive(num) {
        if(activeChapter === num) return;
        activeChapter = num;
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('bg-secondary/20', 'border-secondary/50', 'shadow-[0_0_15px_rgba(233,195,73,0.2)]');
            btn.classList.add('border-transparent');
            btn.querySelector('.nav-text').classList.replace('text-secondary', 'text-on-surface');
            btn.querySelector('.nav-title').classList.remove('text-primary');
        });
        const activeBtn = document.getElementById(`nav-btn-${num}`);
        if(activeBtn) {
            activeBtn.classList.replace('border-transparent', 'border-secondary/50');
            activeBtn.classList.add('bg-secondary/20', 'shadow-[0_0_15px_rgba(233,195,73,0.2)]');
            activeBtn.querySelector('.nav-text').classList.replace('text-on-surface', 'text-secondary');
            activeBtn.querySelector('.nav-title').classList.add('text-primary');
        }
    }

    function setupScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) updateSidebarActive(parseInt(entry.target.id.replace('chapter-', '')));
            });
        }, { rootMargin: '-30% 0px -60% 0px' });
        document.querySelectorAll('.chapter-section').forEach(section => observer.observe(section));
        window.addEventListener('scroll', handleNavVisibility, { passive: true });
    }

    // Fully restored Gita Data with chapters 1-20
    const gitaData = [
        {
            chapter: 1,
            sanskritTitle: "साक्ष्युपदेश",
            title: "Instruction on Self-Realization",
            verses: [
                {
                    sanskrit: "<p>कथं ज्ञानमवाप्नोति कथं मुक्तिर्भविष्यति।</p><p>वैराग्यं च कथं प्राप्तमेतद् ब्रूहि मम प्रभो ।।</p>",
                    transliteration: "katham jnanam avapnoti katham muktir bhavishyati |<br/>vairagyam cha katham praptam etad bruhi mama prabho ||",
                    english: "\"Master, how is Knowledge to be achieved, detachment acquired, liberation attained?\"",
                    hindi: "\"हे प्रभो! ज्ञान कैसे प्राप्त होता है? मुक्ति कैसे होती है? और वैराग्य कैसे प्राप्त होता है? यह मुझे कहिए।\""
                },
                {
                    sanskrit: "<p>मुक्तिमिच्छसि चेत्तात विषयान् विषवत्यज् ।</p><p>क्षमार्जवदयातोषं सत्यं पीयूषवद् भज ।।</p>",
                    transliteration: "muktim icchasi chet tata vishayan visha vat tyaja |<br/>kshama arjava daya tosham satyam piyusha vad bhaja ||",
                    english: "\"To be free, shun the experiences of the senses like poison. Turn your attention to forgiveness, sincerity, kindness, simplicity, truth.\"",
                    hindi: "\"हे प्रिय ! यदि तू मुक्ति चाहता है तो विषयों को विष के समान छोड़ दे और क्षमा, आर्जव (सरलता), दया, सन्तोष और सत्य को अमृत के समान सेवन कर।\""
                },
                {
                    sanskrit: "<p>न पृथ्वी न जलं नाग्निर्न वायुर्यौर्न वा भवान्।</p><p>एषां साक्षिणमात्मामं चिद्रूपं विद्धि मुक्तये ।।</p>",
                    transliteration: "na prithvi na jalam na agnir na vayur dyaur na va bhavan |<br/>esham sakshinam atmanam chid rupam viddhi muktaye ||",
                    english: "\"You are not earth, water, fire or air. Nor are you empty space. Liberation is to know yourself as Awareness alone—the Witness of these.\"",
                    hindi: "\"तू न पृथ्वी है, न जल है, न अग्नि है, न वायु है, न आकाश है। मुक्ति के लिये अपने को इन सबका साक्षी चैतन्यरूप जान।\""
                },
                {
                    sanskrit: "<p>यदि देहं पृथक्कृत्य चित्ति विश्राम्य तिष्ठसि ।</p><p>अधुनैव सुखी शान्तः बन्धमुक्तो भविष्यसि ।।</p>",
                    transliteration: "yadi deham prithak kritya chiti vishramya tishthasi |<br/>adhunaiva sukhi shantah bandha mukto bhavishyasi ||",
                    english: "\"Abide in Awareness with no illusion of person. You will be instantly free and at peace.\"",
                    hindi: "\"यदि तू देह को अपने से अलग कर और चैतन्य में विश्राम कर स्थित है तो अभी ही सुखी, शान्त और बन्ध-मुक्त हो जायेगा।\""
                },
                {
                    sanskrit: "<p>न त्वं विप्रादिको वर्णो नाश्रमी नाक्षगोचरः ।</p><p>असंगोऽसि निराकारो विश्वसाक्षी सुखी भव।।</p>",
                    transliteration: "na tvam vipradiko varno na ashrami na aksha gocharah |<br/>asango'si nirakaro vishva sakshi sukhi bhava ||",
                    english: "\"You have no caste or duties. You are invisible, unattached, formless. You are the Witness of all things. Be happy.\"",
                    hindi: "\"तू ब्राह्मण आदि वर्ण नहीं है और न तू किसी आश्रम वाला है; न आँख आदि इन्द्रियों का विषय है। ऐसा जानकर सुखी हो।\""
                },
                {
                    sanskrit: "<p>धर्माऽधर्मो सुखं दुःखं मानसानि न ते विभो ।</p><p>न कर्ताऽसि न भोक्ताऽसि मुक्त एवासि सर्वदा ।।</p>",
                    transliteration: "dharmadharmo sukham duhkham manasani na te vibho |<br/>na karta'si na bhokta'si mukta evasi sarvada ||",
                    english: "\"Right and wrong, pleasure and pain, exist in mind only. They are not your concern. You neither do nor enjoy. You are free.\"",
                    hindi: "\"तू विभो ! (व्यापक) धर्म और अधर्म, सुख और दुःख मन के हैं। तेरे लिये नहीं हैं। तू न कर्त्ता है, न भोक्ता। तू तो सर्वदा मुक्त ही है।\""
                },

                    sanskrit: "<p>चेष्टमानं शरीरं स्वं पश्यत्यन्यशरीरवत् ।</p><p>संस्तवे चापि निन्दायां कथं क्षुभ्येन्महाशयः ॥</p>",
                    transliteration: "cheshtamanam shariram svam pashyatyanyashariravat |<br/>samstave chapi nindayam katham kshubhyenmahashayah ||",
                    english: "\"The great-souled one sees his own body acting as if it were another's. How can he be disturbed by praise or blame?\"",
                    hindi: "\"महाशय व्यक्ति अपने ही शरीर को अन्य के शरीर की भाँति चेष्टा करते हुए देखता है। वह स्तुति या निंदा से कैसे क्षुब्ध हो सकता है?\""
                },
                {
                    sanskrit: "<p>मायामात्रमिदं विश्वं पश्यन् विगतकौतुकः ।</p><p>अपि सन्निहिते मृत्यौ कथं त्रस्यति धीरधीः ॥</p>",
                    transliteration: "mayamatramidam vishvam pashyan vigatakautukah |<br/>api sannihite mrityau katham trasyati dhiradhih ||",
                    english: "\"Seeing this universe as mere illusion and free from curiosity, how can the steadfast one be terrified even when death is near?\"",
                    hindi: "\"इस विश्व को केवल माया रूप देखता हुआ और कौतूहल से रहित धीर बुद्धि वाला व्यक्ति मृत्यु के निकट आने पर भी कैसे डर सकता है?\""
                },
                {
                    sanskrit: "<p>निस्पृहं मानसं यस्य नैराश्येऽपि महात्मनः ।</p><p>तस्यात्मज्ञानतृप्तस्य तुलना केन जायते ॥</p>",
                    transliteration: "nispriham manasam yasya nairashye'pi mahatmanah |<br/>tasyatmajnianatriptasya tulana kena jayate ||",
                    english: "\"With whom can that great soul be compared, whose mind is free from desire even in disappointment, and who is satisfied with Self-knowledge?\"",
                    hindi: "\"उस महात्मा की तुलना किससे की जा सकती है, जिसका मन निराशा में भी इच्छारहित है और जो केवल आत्मज्ञान से तृप्त है?\""
                },
                {
                    sanskrit: "<p>स्वभावादेव जानानो दृश्यमेतन्न किंचन ।</p><p>इदं ग्राह्यमिदं त्याज्यं स किं पश्यति धीरधीः ॥</p>",
                    transliteration: "svabhavadeva janano drishyametanna kimchana |<br/>idam grahyamidam tyajyam sa kim pashyati dhiradhih ||",
                    english: "\"Knowing by nature that the visible world is nothing, how can the steadfast one consider this to be acceptable and that to be rejectable?\"",
                    hindi: "\"स्वभाव से ही यह जानते हुए कि यह दृश्यमान जगत कुछ भी नहीं है, धीर बुद्धि वाला पुरुष क्या यह देखता है कि यह ग्रहण करने योग्य है और यह त्यागने योग्य?\""
                },
                {
                    sanskrit: "<p>अन्तस्त्यक्तकषायस्य निर्द्वन्द्वस्य निराशिषः ।</p><p>यदृच्छयागतो भोगो न दुःखाय न तुष्टये ॥</p>",
                    transliteration: "antastyaktakashayasya nirdvandvasya nirashishah |<br/>yadricchayagato bhogo na duhkhaya na tushtaye ||",
                    english: "\"For him who has given up inner passions, who is beyond duality and without expectations, enjoyment coming of its own accord causes neither sorrow nor pleasure.\"",
                    hindi: "\"जिसने भीतर की वासनाओं को त्याग दिया है, जो द्वंद्वों से रहित और आशारहित है, उसे स्वेच्छा (प्रारब्ध) से प्राप्त भोग न दुःख देता है और न ही संतुष्टि।\""
                }
            ]
        },
        {

            sanskritTitle: "उल्लासः",
            title: "Glorification of Self-Realization",
            verses: [
                {
                    sanskrit: "<p>हन्तात्मज्ञानस्य धीरस्य खेलतो भोगिच्छया ।</p><p>न हि संसारवाहीकैर्मूढैः सह समानता ॥</p>",
                    transliteration: "hantatmajnanasya dhirasya khelato bhogicchaya |<br/>na hi samsaravahaikairmudhaih saha samanata ||",

                    hindi: "\"आत्मज्ञानी धीर पुरुष इच्छा से खेलता है, संसार का बोझ ढोने वाले मूढ़ों के साथ उसकी कोई समानता नहीं है।\""
                },
                {
                    sanskrit: "<p>यत् पदं प्रेप्सवो दीनाः शक्राद्याः सर्वदेवताः ।</p><p>अहो तत्र स्थितो योगी न हर्षमुपगच्छति ॥</p>",
                    transliteration: "yat padam prepsavo dinah shakradyah sarvadevatah |<br/>aho tatra sthito yogi na harshamupagacchati ||",
                    english: "\"Oh, the yogi who abides in that state which Indra and all the other gods desperately desire, feels no elation.\"",
                    hindi: "\"अहो! जिस पद को प्राप्त करने के लिए इंद्र आदि सभी देवता लालायित रहते हैं, उस पद पर स्थित होकर भी योगी हर्षित नहीं होता।\""
                },
                {
                    sanskrit: "<p>तज्ज्ञास्य पुण्यपापाभ्यां स्पर्शो ह्यन्तर्न जायते ।</p><p>न ह्याकाशस्य धूमेन दृश्यमानापि सङ्गतिः ॥</p>",
                    transliteration: "tajjnasya punyapapabhyam sparsho hyantarna jayate |<br/>na hyakashasya dhumena drishyamanapi sangatih ||",
                    english: "\"He who knows That is untouched within by good and evil, just as space is not touched by smoke, though it appears to be.\"",
                    hindi: "\"उस तत्व को जानने वाले के अंतःकरण में पुण्य और पाप का स्पर्श नहीं होता, जैसे दिखाई देने पर भी आकाश का धुएं से कोई संग (संपर्क) नहीं होता।\""
                },
                {
                    sanskrit: "<p>आत्मैवेदं जगत् सर्वं ज्ञातं येन महात्मना ।</p><p>यदृच्छया वर्तमानं तं निषेद्धुं क्षमेत कः ॥</p>",
                    transliteration: "atmaivedam jagat sarvam jnatam yena mahatmana |<br/>yadricchaya vartamanam tam nisheddhum kshameta kah ||",
                    english: "\"Who can prevent the great-souled one, who has known this entire universe to be the Self alone, from living as he pleases?\"",
                    hindi: "\"जिस महात्मा ने इस संपूर्ण जगत को केवल आत्मा ही जान लिया है, स्वेच्छा से विचरण करते हुए उसे रोकने में कौन समर्थ है?\""
                },
                {
                    sanskrit: "<p>आब्रह्मस्तम्बपर्यन्ते भूतग्रामे चतुर्विधे ।</p><p>विज्ञस्यैव हि सामर्थ्यमिच्छानिच्छाविवर्जने ॥</p>",
                    transliteration: "abrahmastambaparyante bhutagrame chaturvidhe |<br/>vijnasyaiva hi samarthyamicchanicchavivarjane ||",
                    english: "\"Of the four kinds of creatures, from Brahma down to a blade of grass, only the wise one is capable of renouncing desire and aversion.\"",
                    hindi: "\"ब्रह्मा से लेकर तिनके तक चार प्रकार के जीवों के समूह में, इच्छा और अनिच्छा को त्यागने की सामर्थ्य केवल ज्ञानी में ही है।\""
                },
                {
                    sanskrit: "<p>आत्मानमद्वयं कश्चिज्जानाति जगदीश्वरम् ।</p><p>यद् वेत्ति तत् स कुरुते न भयं तस्य कुत्रचित् ॥</p>",
                    transliteration: "atmanamadvayam kashchijjanati jagadishvaram |<br/>yad vetti tat sa kurute na bhayam tasya kutrachit ||",
                    english: "\"Rare is the man who knows the non-dual Self as the Lord of the universe. He does what he knows to be done, and has no fear from any quarter.\"",
                    hindi: "\"कोई विरला ही अद्वैत आत्मा को जगत का ईश्वर (मालिक) जानता है। वह जो उचित समझता है, वही करता है; उसे कहीं से भी कोई भय नहीं है।\""
                }
            ]
        },
        { chapter: 5, sanskritTitle: "लयक्रमः", title: "Four Ways to Dissolution", verses: [{ sanskrit: "<p>न ते संगोऽस्ति केनापि किं शुद्धस्त्यक्तुमिच्छसि ।</p><p>संघातविलयं कुर्वन्नेवमेव लयं व्रज ॥</p>", transliteration: "na te sango'sti kenapi kim shuddhastyaktumicchasi |<br/>sanghatavilayam kurvannevameva layam vraja ||", english: "\"You are pure and not attached to anything. What is there to renounce? Dissolve the body complex and find peace.\"", hindi: "\"तेरा किसी के साथ संग नहीं है, तू शुद्ध है, फिर क्या छोड़ना चाहता है? देह के संघात का लय कर और शान्ति प्राप्त कर।\""}] },
        { chapter: 6, sanskritTitle: "ज्ञानस्वरूपम्", title: "The Higher Knowledge", verses: [{ sanskrit: "<p>आकाशवदनन्तोऽहं घटवत्प्राकृतं जगत् ।</p><p>इति ज्ञानं तथैतस्य न त्यागो न ग्रहो लयः ॥</p>", transliteration: "akashavadananto'ham ghatavatprakritam jagat |<br/>iti jnanam tathaitasya na tyago na graho layah ||", english: "\"I am infinite like space; the natural world is like a jar. This is knowledge. There is nothing to renounce, accept, or destroy.\"", hindi: "\"मैं आकाश के समान अनंत हूँ और प्राकृतिक जगत घड़े के समान है। यह ज्ञान है, अतः न इसका त्याग है, न ग्रहण और न ही लय।\""}] },
        { chapter: 7, sanskritTitle: "शान्तिः", title: "Nature of Self-Realization", verses: [{ sanskrit: "<p>मय्यनन्तमहाम्भोधौ विश्वपोत इतस्ततः ।</p><p>भ्रमति स्वान्तवातेन न ममास्त्यसहिष्णुता ॥</p>", transliteration: "mayyanantamahambhodhau vishvapota itastatah |<br/>bhramati svantavatena na mamastyasahishnuta ||", english: "\"In Me, the limitless ocean, the ark of the universe drifts hither and thither, driven by the wind of its own nature. I am not disturbed.\"", hindi: "\"मुझ अनंत महासागर में यह विश्वरूपी नाव अपने स्वभाव की वायु से इधर-उधर घूमती है, मुझे इससे कोई असहिष्णुता नहीं है।\""}] },
        { chapter: 8, sanskritTitle: "बन्धमोक्षौ", title: "Bondage and Liberation", verses: [{ sanskrit: "<p>तदा बन्धो यदा चित्तं किंचिद्वाञ्छति शोचति ।</p><p>किंचिन्मुञ्चति गृह्णाति किंचिद्धृष्यति कुप्यति ॥</p>", transliteration: "tada bandho yada chittam kimchidvanjhati shochati |<br/>kimchinmunchati grihnati kimchiddhrishyati kupyati ||", english: "\"It is bondage when the mind desires, grieves, rejects, accepts, feels joy, or feels anger.\"", hindi: "\"बंधन तब है जब चित्त कुछ चाहता है, शोक करता है, कुछ छोड़ता है, ग्रहण करता है, हर्षित होता है या क्रोध करता है।\""}] },
        { chapter: 9, sanskritTitle: "निर्वेदः", title: "Detachment", verses: [{ sanskrit: "<p>कृताकृते च द्वन्द्वानि कदा शान्तानि कस्य वा ।</p><p>एवं ज्ञात्वेह निर्वेदाद्भव त्यागपरोऽव्रती ॥</p>", transliteration: "kritakrite cha dvandvani kada shantani kasya va |<br/>evam jnatveha nirvedadbhava tyagaparo'vrati ||", english: "\"When are the dualities of things done and undone ever at rest? Knowing this, become indifferent to the world, renounce, and be vowless.\"", hindi: "\"किए हुए और न किए हुए के द्वंद्व किसके और कब शांत हुए हैं? ऐसा जानकर वैराग्य से त्यागी और व्रतरहित हो जा।\""}] },
        { chapter: 10, sanskritTitle: "वैराग्यम्", title: "Quietude", verses: [{ sanskrit: "<p>विहाय वैरिणं काममर्थं चानर्थसङ्कुलम् ।</p><p>धर्ममप्येतयोर्हेतुं सर्वत्रानादरं कुरु ॥</p>", transliteration: "vihaya vairinam kamamartham chanarthasankulam |<br/>dharmamapyetayorhetum sarvatranadaram kuru ||", english: "\"Give up desire, the enemy, and wealth, which is full of mischief. Give up duty, the cause of the other two. Be indifferent to everything.\"", hindi: "\"शत्रु रूप काम और अनर्थ से भरे धन को छोड़ दे। इन दोनों के कारण रूप धर्म को भी छोड़ और सर्वत्र अनादर (उदासीनता) कर।\""}] },
        { chapter: 11, sanskritTitle: "चिद्रूपम्", title: "Wisdom", verses: [{ sanskrit: "<p>भावाभावविकारश्च स्वभावादिति निश्चयी ।</p><p>निर्विकारो गतक्लेशः सुखेनैवोपशाम्यति ॥</p>", transliteration: "bhavabhavavikarashcha svabhavaditi nishchayi |<br/>nirvikaro gatakleshah sukhenaivopashamyati ||", english: "\"He who knows that existence, non-existence, and change are in the nature of things finds peace easily, being free from distress.\"", hindi: "\"भाव (उत्पत्ति), अभाव (विनाश) और विकार स्वभाव से ही हैं—ऐसा निश्चय करने वाला, निर्विकार और क्लेशरहित होकर सुखपूर्वक शांत हो जाता है।\""}] },
        { chapter: 12, sanskritTitle: "स्वभावः", title: "Abiding in the Self", verses: [{ sanskrit: "<p>कायकृत्यासहः पूर्वं ततो वाग्विस्तरासहः ।</p><p>अथ चिन्तासहस्तस्मादेवमेवाहमस्थितः ॥</p>", transliteration: "kayakrityasahah purvam tato vagvistarashah |<br/>atha chintasahastasmadevamevahamashitah ||", english: "\"First I became intolerant of physical action, then of extensive speech, and finally of thought itself. Thus, I abide as I am.\"", hindi: "\"पहले मैं शारीरिक कर्मों के प्रति असहिष्णु हुआ, फिर वाणी के विस्तार के प्रति। अब मैं विचार के प्रति भी असहिष्णु हूँ। अतः मैं ऐसे ही स्थित हूँ।\""}] },
        { chapter: 13, sanskritTitle: "यथासुखम्", title: "Happiness", verses: [{ sanskrit: "<p>अकिंचनभवं स्वास्थ्यं कौपीनत्वेऽपि दुर्लभम् ।</p><p>त्यागादाने विहायास्मादहमासे यथासुखम् ॥</p>", transliteration: "akincanabhavam svasthyam kaupinatve'pi durlabham |<br/>tyagadane vihayasmadahamase yathasukham ||", english: "\"The peace born of having nothing is difficult to attain even by wearing a loincloth. Therefore, giving up acceptance and rejection, I live happily.\"", hindi: "\"अकिंचन (कुछ न होने) से उत्पन्न स्वास्थ्य लंगोटी पहनने पर भी दुर्लभ है। अतः त्याग और ग्रहण को छोड़कर मैं सुखपूर्वक स्थित हूँ।\""}] },
        { chapter: 14, sanskritTitle: "शान्तिः", title: "Tranquility", verses: [{ sanskrit: "<p>प्रकृत्या शून्यचित्तो यः प्रमादाद्भावभावनः ।</p><p>निद्रितो बोधित इव क्षीणसंस्मरणो हि सः ॥</p>", transliteration: "prakritya shunyachitto yah pramadatbhavabhavanah |<br/>nidrito bodhita iva kshinasamsmarano hi sah ||", english: "\"He whose mind is empty by nature, and who only thinks of things inadvertently, is like one awakened from a dream, his memories fading.\"", hindi: "\"जो स्वभाव से ही शून्यचित्त है और केवल प्रमादवश पदार्थों का चिंतन करता है, वह नींद से जागे हुए व्यक्ति के समान है जिसकी स्मृतियाँ क्षीण हो गई हैं।\""}] },
        { chapter: 15, sanskritTitle: "तत्त्वज्ञानम्", title: "Knowledge of the Self", verses: [{ sanskrit: "<p>यथार्थतत्वं धीरस्य स्वात्मन्येवावतिष्ठते ।</p><p>अतस्तस्य न बन्धोऽस्ति न च मोक्षः कथंचन ॥</p>", transliteration: "yatharthatatvam dhirasya svatmanyevavatishthate |<br/>atastasya na bandho'sti na cha mokshah kathanchana ||", english: "\"The true nature of the wise man rests entirely in the Self. Therefore, he has no bondage, nor any liberation whatsoever.\"", hindi: "\"धीर पुरुष का यथार्थ तत्व अपनी आत्मा में ही स्थित है। अतः उसके लिए किसी भी प्रकार का न बंधन है न मोक्ष।\""}] },
        { chapter: 16, sanskritTitle: "विशेषोपदेशः", title: "Special Instruction", verses: [{ sanskrit: "<p>आचक्ष्व शृणु वा तात नानाशास्त्राण्यनेकशः ।</p><p>तथापि न तव स्वास्थ्यं सर्वविस्मरणादृते ॥</p>", transliteration: "achakshva shrinu va tata nanashastranyanekashah |<br/>tathapi na tava svasthyam sarvavismaranadrite ||", english: "\"My child, you may often speak upon various scriptures or hear them. But you cannot be established in the Self unless you forget all.\"", hindi: "\"हे तात! तुम अनेक शास्त्रों का वर्णन करो या सुनो, फिर भी सब कुछ भूले बिना तुम्हें स्वास्थ्य (आत्म-स्थिति) प्राप्त नहीं होगा।\""}] },
        { chapter: 17, sanskritTitle: "तत्त्वज्ञः", title: "The True Knower", verses: [{ sanskrit: "<p>तेन ज्ञानफलं प्राप्तं योगाभ्यासफलं तथा ।</p><p>तृप्तः स्वच्छेन्द्रियो नित्यं एकाकी रमते तु यः ॥</p>", transliteration: "tena jnanaaphalam praptam yogabhyasaphalam tatha |<br/>triptah svachchendriyo nityam ekaki ramate tu yah ||", english: "\"He has reaped the fruit of knowledge and the fruit of yoga practice who, always content and with purified senses, enjoys being alone.\"", hindi: "\"उसी ने ज्ञान का फल और योग-अभ्यास का फल प्राप्त किया है, जो सदैव तृप्त है, जिसकी इंद्रियां निर्मल हैं और जो एकांत में रमता है।\""}] },
        { chapter: 18, sanskritTitle: "शान्तिः", title: "Peace", verses: [{ sanskrit: "<p>यस्य बोधोदये तावत्स्वप्नवद्भवति भ्रमः ।</p><p>तस्य खण्डसुखं किं वा किंचिद्दुःखं कथंचन ॥</p>", transliteration: "yasya bodhodaye tavatsvapnavadbhavati bhramah |<br/>tasya khandasukham kim va kinchidduhkham kathanchana ||", english: "\"For him whose illusion is dispelled like a dream by the dawn of knowledge, what is limited happiness or even a little sorrow?\"", hindi: "\"ज्ञान के उदय होने पर जिसके लिए संसार स्वप्न की तरह भ्रममात्र रह जाता है, उसके लिए खंडित सुख या थोड़ा भी दुःख कैसे हो सकता है?\""}] },
        { chapter: 19, sanskritTitle: "आत्मविश्रान्तिः", title: "Repose in the Self", verses: [{ sanskrit: "<p>तत्त्वविज्ञानसन्दंशमादाय हृदयोदरात् ।</p><p>नानाविधपरामर्शशल्योद्धारः कृतो मया ॥</p>", transliteration: "tattvavijnanasandanshamadaya hridayodarat |<br/>nanavidhaparamarshashalyoddharah krito maya ||", english: "\"Using the tongs of true knowledge, I have extracted the thorn of diverse thoughts from the depths of my heart.\"", hindi: "\"तत्वज्ञान रूपी चिमटे से मैंने अपने हृदय के भीतर से अनेक प्रकार के विचारों रूपी कांटों को निकाल दिया है।\""}] },
        { chapter: 20, sanskritTitle: "जीवन्मुक्तः", title: "Liberation-in-Life", verses: [{ sanskrit: "<p>क्व भूतानि क्व देहो वा क्वेन्द्रियाणि क्व वा मनः ।</p><p>क्व शून्यं क्व च नैराश्यं मत्स्वरूपे निरञ्जने ॥</p>", transliteration: "kva bhutani kva deho va kvendriyani kva va manah |<br/>kva shunyam kva cha nairashyam matsvarupe niranjane ||", english: "\"Where are the elements, where is the body, where are the organs, or where is the mind? Where is void or despair, in my spotless nature?\"", hindi: "\"मुझ निरंजन स्वरूप में तत्व कहाँ हैं, देह कहाँ है, इंद्रियां कहाँ हैं, या मन कहाँ है? शून्यता या निराशा भी कहाँ है?\""}] }
    ];

    function renderSidebar() {
        const list = document.getElementById('chapter-list');
        let html = '';
        gitaData.forEach((data, index) => {
            const i = data.chapter;
            const isActive = i === 1;
            html += `
                <button id="nav-btn-${i}" onclick="switchChapter(${i})" class="nav-btn w-full text-left px-4 py-3 rounded-xl transition-all duration-300 group border ${isActive ? 'bg-secondary/20 border-secondary/50 shadow-[0_0_15px_rgba(233,195,73,0.2)]' : 'border-transparent hover:bg-white/5'}">
                    <div class="flex items-center mb-1">
                        <span class="nav-text font-headline italic text-lg ${isActive ? 'text-secondary' : 'text-on-surface'}">${i}. ${data.sanskritTitle}</span>
                    </div>
                    <div class="nav-title text-[10px] tracking-widest uppercase truncate ${isActive ? 'text-primary' : 'text-on-surface-variant/60'}">${data.title}</div>
                </button>`;
        });
        list.innerHTML = html;
    }

    function renderAllVerses() {
        const container = document.getElementById('verses-container');
        let html = '';
        gitaData.forEach((chapterData) => {
            html += `<div id="chapter-${chapterData.chapter}" class="chapter-section border-b border-white/5">
                <div class="chapter-title-slide text-center w-full px-6">
                    <h2 class="font-devanagari text-5xl md:text-7xl lg:text-8xl text-secondary mb-6 tracking-widest text-glow font-semibold">${chapterData.sanskritTitle}</h2>
                    <h3 class="font-label text-primary/80 tracking-[0.2em] uppercase text-sm md:text-base">Chapter ${chapterData.chapter} | ${chapterData.title}</h3>
                </div>`;
            chapterData.verses.forEach((verse, index) => {
                const displayVerseNum = `${chapterData.chapter.toString().padStart(2, '0')}.${(index + 1).toString().padStart(2, '0')}`;
                const isEven = index % 2 === 0;
                const alignment = isEven ? 'text-left lg:text-right pl-6 lg:pl-0 pr-6 lg:pr-10' : 'pl-6 lg:pl-10 text-left';
                const interpAlign = isEven ? 'mr-auto pl-6 lg:pl-10' : 'mr-auto lg:mr-0 lg:ml-auto pl-6 lg:pl-0 pr-6 lg:pr-10 text-left lg:text-right';
                const borderStyle = isEven ? 'border-l-2 lg:border-l-0 lg:border-r-2 border-secondary/40' : 'border-l-2 border-secondary/40';

                // We process the sanskrit text here to make punctuations "sticky"
                const processedSanskrit = makePunctuationSticky(verse.sanskrit);

                html += `
                    <article class="relative z-10">
                        <div class="absolute inset-0 z-0 opacity-[0.05] pointer-events-none flex items-center justify-center mix-blend-screen">
                            <svg viewBox="0 0 100 150" class="w-[80vw] h-[80vw] md:w-[45vw] md:h-[45vw] text-secondary" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="20" r="8" fill="currentColor"/><path d="M50 28c-15 17 15 37-2 57M50 32c-20 3-35 13-30 33m30-33c20 3 25 18 12 33m-14 20c-18 25-13 45-8 60m8-60c17 20 17 40 7 60M65 30L50 145" />
                            </svg>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 items-center w-full relative z-10">
                            <div class="lg:col-span-7 space-y-8 pt-12 pb-0 lg:py-12 ${isEven ? 'order-1' : 'order-1 lg:order-2'}">
                                <div class="space-y-4">
                                    <h2 class="font-label text-secondary tracking-widest uppercase text-[10px] ${alignment}">|| ${displayVerseNum} ||</h2>
                                    <div class="sanskrit-verse text-2xl md:text-4xl leading-relaxed md:leading-snug ${alignment} text-purple-gold ${borderStyle} py-4">${processedSanskrit}</div>
                                </div>
                                <div class="${alignment}">
                                    <h3 class="font-label text-on-surface-variant/60 tracking-[0.2em] uppercase text-[10px] mb-4">Transliteration</h3>
                                    <p class="italic font-body leading-relaxed text-sm md:text-base text-primary">${verse.transliteration}</p>
                                </div>
                            </div>
                            <div class="lg:col-span-5 pt-8 pb-12 lg:py-12 ${isEven ? 'order-2' : 'order-2 lg:order-1'}">
                                <div class="max-w-sm w-full ${interpAlign}">
                                    <div class="flex items-center gap-3 mb-6 ${isEven ? '' : 'lg:justify-end'}">
                                        <h3 class="font-label text-secondary/60 tracking-[0.2em] uppercase text-[10px]">Interpretation</h3>
                                        <button onclick="toggleTranslation()" class="trans-btn font-label text-secondary/60 hover:text-primary tracking-[0.2em] uppercase text-[10px] cursor-pointer">HINDI</button>
                                    </div>
                                    <p class="lang-en text-on-surface font-headline text-lg md:text-xl italic text-primary">${verse.english}</p>
                                    <p class="lang-hi text-on-surface font-devanagari text-xl md:text-2xl text-primary">${verse.hindi}</p>
                                </div>
                            </div>
                        </div>
                    </article>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        setupScrollObserver();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderSidebar();
        renderAllVerses();
    });
</script>
</body>
</html>
